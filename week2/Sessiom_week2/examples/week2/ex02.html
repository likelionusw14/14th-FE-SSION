<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연습문제 2</title>
    <style>
			#container { 
				width:520px;
				border:1px solid black;
				padding:20px 40px;
				margin:0 auto;
			}
    	fieldset { margin-bottom:15px; }
    	legend { font-weight:bold; }
			ul {list-style-type: none;}
			li { line-height:30px;}
    </style>
</head>
	<body>
		<div id="container">
			<h1>프론트엔드 개발자 지원서 </h1>
			<p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
			<hr>
			<form>
				<h4>개인정보</h4>
				<ul>
				<li><label for="name">이름</label>
				<input type="text" id="name" name="name" placeholder="공백없이 입력하세요&ensp;&ensp;"></li>
				<label for="contact">연락처</label>	
				<input type="text" id="contact" name="contact">
			</ul>
				<h4>지원 분야</h4>
				<ul>
					<li><input type="radio" id="publishing" name="field" value="publishing">
					<label for="publishing">웹 퍼블리싱</label></li>
					<li><input type="radio" id="development" name="field" value="devlopment">
					<label for="frontend">웹 어플리케이션 개발</label></li>
					<input type="radio" id="improvement" name="field" value="improvement">
					<label for="improvement">개발 환경 개선</label>
				</ul>
				<h4>지원동기</h4>
				<textarea name="reason" id="reason" cols="60" rows="5" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
				<button type="button">접수하기</button>
				<button type="button">다시 쓰기</button>
			</form>
		</div>
	</body>
</html>
