<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>문제 2 정답 — 멤버 데이터</title>
  <style>
    body {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: #F8FAFC;
      color: #1E293B;
    }
    h1 { color: #F59E0B; }
  </style>
</head>
<body>
  <h1>문제 2 정답</h1>
  <p>콘솔(F12) 열고 확인!</p>

  <script>
    // 1) 멤버 배열 만들기
    const members = [
      { id: 1, name: '김사자', present: false },
      { id: 2, name: '이사자', present: false },
      { id: 3, name: '박사자', present: false },
      { id: 4, name: '최사자', present: false },
      { id: 5, name: '정사자', present: false },
    ];

    // 2) 전체 인원 수
    console.log('전체 인원:', members.length);

    // 3) 첫 번째 멤버 이름
    console.log('첫 번째 멤버:', members[0].name);

    // 4) 두 번째 멤버 출석 처리
    members[1].present = true;
    console.log('두 번째 멤버:', members[1]);

    // 5) 새 멤버 추가
    members.push({ id: 6, name: '새사자', present: false });
    console.log('추가 후:', members);

    // 선택) find로 특정 멤버 찾기
    const found = members.find((member) => member.name === '김사자');
    console.log('찾은 멤버:', found);

  </script>
</body>
</html>
